name: Build ENet-CSharp

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - linux
          - windows
          - macos
          - android
          - ios
          - visionos

jobs:

  build-linux:
    name: Native - Linux (x64)
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'linux' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Configure and build
        run: |
          cmake -S Source/Native -B build-linux \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DENET_SHARED=true
          cmake --build build-linux --config Release

      - name: Verify output
        run: |
          echo "=== Linux outputs ==="
          find build-linux -type f | sort
          test -n "$(find build-linux -name "*.so" -print -quit)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enet-linux-x64
          path: build-linux/*.so
          if-no-files-found: error

  build-windows:
    name: Native - Windows (x64)
    runs-on: windows-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'windows' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure and build
        shell: pwsh
        run: |
          cmake -S Source/Native -B build-windows -A x64 `
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 `
            -DENET_SHARED=true
          cmake --build build-windows --config Release

      - name: Verify output
        shell: pwsh
        run: |
          Write-Host "=== Windows outputs ==="
          Get-ChildItem -Recurse build-windows | ForEach-Object { $_.FullName }
          $dll = Get-ChildItem -Recurse build-windows -Filter *.dll | Select-Object -First 1
          if (-not $dll) { throw "No DLL produced." }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enet-windows-x64
          path: build-windows/Release/*.dll
          if-no-files-found: error

  build-macos:
    name: Native - macOS
    runs-on: macos-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'macos' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Configure and build
        run: |
          cmake -S Source/Native -B build-macos \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DENET_SHARED=true
          cmake --build build-macos --config Release

      - name: Verify output
        run: |
          echo "=== macOS outputs ==="
          find build-macos -type f | sort
          test -n "$(find build-macos -name "*.dylib" -print -quit)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enet-macos-x64
          path: build-macos/*.dylib
          if-no-files-found: error

  build-android:
    name: Native - Android
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'android' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r28c
        run: |
          sdkmanager "ndk;28.2.13676358"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/28.2.13676358" >> "$GITHUB_ENV"

      - name: Show Android build files
        run: |
          echo "=== Source/Native/jni ==="
          ls -la Source/Native/jni
          echo ""
          echo "=== Application.mk ==="
          cat Source/Native/jni/Application.mk
          echo ""
          echo "=== Android.mk ==="
          cat Source/Native/jni/Android.mk

      - name: Build with ndk-build
        run: |
          "$ANDROID_NDK_HOME/ndk-build" \
            -C Source/Native \
            NDK_PROJECT_PATH=. \
            NDK_APPLICATION_MK=jni/Application.mk \
            NDK_LIBS_OUT=libs \
            V=1

      - name: Verify Android outputs
        run: |
          echo "=== Android outputs ==="
          find Source/Native/libs -type f | sort
          test -n "$(find Source/Native/libs -name "*.so" -print -quit)"

      - name: Verify 16KB page alignment
        run: |
          LLVM_READELF="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf"
          find Source/Native/libs -name "*.so" | while read -r f; do
            echo ""
            echo "File: $f"
            "$LLVM_READELF" --program-headers "$f" | grep -E "LOAD|Align" || true
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enet-android
          path: Source/Native/libs/
          if-no-files-found: error

  build-ios:
    name: Native - iOS
    runs-on: macos-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'ios' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build with Xcode script
        run: |
          cd Source/Native
          sh build-ios.sh

      - name: Verify output
        run: |
          ls -lh Source/Native/libenet.a
          test -f Source/Native/libenet.a

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enet-ios
          path: Source/Native/libenet.a
          if-no-files-found: error

  build-visionos:
    name: Native - visionOS (Vision Pro)
    runs-on: macos-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'visionos' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build libenet.a for visionOS
        run: |
          set -euxo pipefail

          SDK_PATH="$(xcrun --sdk xros --show-sdk-path)"
          CLANG="$(xcrun --sdk xros --find clang)"
          LIBTOOL="$(xcrun --find libtool)"

          mkdir -p build-visionos/obj build-visionos/out

          "$CLANG" \
            -target arm64-apple-xros1.0 \
            -isysroot "$SDK_PATH" \
            -O2 \
            -fPIC \
            -I Source/Native \
            -c Source/Native/enet.c \
            -o build-visionos/obj/enet.o

          "$LIBTOOL" -static \
            -o build-visionos/out/libenet.a \
            build-visionos/obj/enet.o

      - name: Verify visionOS output
        run: |
          echo "=== visionOS outputs ==="
          find build-visionos -type f | sort
          ls -lh build-visionos/out/libenet.a
          file build-visionos/out/libenet.a
          test -f build-visionos/out/libenet.a

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enet-visionos
          path: build-visionos/out/libenet.a
          if-no-files-found: error

  build-csharp:
    name: Managed C# Assembly
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build C# project
        run: dotnet build Source/Managed/ENet-CSharp.csproj -c Release

      - name: Verify output
        run: |
          echo "=== Managed outputs ==="
          find Source/Managed/bin/Release -type f | sort
          test -n "$(find Source/Managed/bin/Release -name "*.dll" -print -quit)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enet-csharp-assembly
          path: Source/Managed/bin/Release/**/*.dll
          if-no-files-found: error

  package:
    name: Bundle All Artifacts
    needs:
      - build-linux
      - build-windows
      - build-macos
      - build-android
      - build-ios
      - build-visionos
      - build-csharp
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Verify bundle contents
        run: |
          echo "=== All bundled files ==="
          find artifacts -type f | sort | xargs ls -lh

      - name: Upload combined bundle
        uses: actions/upload-artifact@v4
        with:
          name: enet-all-platforms
          path: artifacts/
          if-no-files-found: error