name: Build ENet-CSharp

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - linux
          - windows
          - macos
          - android
          - ios

jobs:

  # ── Native library: Linux ──────────────────────────────────────────────────
  build-linux:
    name: Native – Linux (x64)
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'linux' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Configure & build
        run: |
          cmake -S Source/Native -B build-linux \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DENET_SHARED=true
          cmake --build build-linux --config Release

      - name: Rename to libenet.so
        run: |
          cd build-linux
          # find whatever .so was produced and rename it
          find . -name "*.so" | xargs -I{} cp {} libenet.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enet-linux-x64
          path: build-linux/libenet.so

  # ── Native library: Windows ───────────────────────────────────────────────
  build-windows:
    name: Native – Windows (x64)
    runs-on: windows-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'windows' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure & build
        run: |
          cmake -S Source/Native -B build-windows -A x64 `
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 `
            -DENET_SHARED=true
          cmake --build build-windows --config Release

      - name: Rename to enet.dll
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Path build-windows/Release -Filter "*.dll" | Select-Object -First 1
          Copy-Item $dll.FullName -Destination "build-windows/Release/enet.dll"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enet-windows-x64
          path: build-windows/Release/enet.dll

  # ── Native library: macOS ─────────────────────────────────────────────────
  build-macos:
    name: Native – macOS (x64)
    runs-on: macos-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'macos' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Configure & build
        run: |
          cmake -S Source/Native -B build-macos \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DENET_SHARED=true
          cmake --build build-macos --config Release

      - name: Rename to libenet.dylib
        run: |
          cd build-macos
          find . -name "*.dylib" | xargs -I{} cp {} libenet.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enet-macos-x64
          path: build-macos/libenet.dylib

  # ── Android (arm64-v8a, armeabi-v7a, x86) ────────────────────────────────
  build-android:
    name: Native – Android
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'android' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"

      - name: Build with ndk-build
        run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653
          cd Source/Native
          $ANDROID_NDK_HOME/ndk-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enet-android
          path: Source/Native/libs/

  # ── iOS (ARM64) ───────────────────────────────────────────────────────────
  build-ios:
    name: Native – iOS
    runs-on: macos-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'ios' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build with Xcode
        run: |
          cd Source/Native
          sh build-ios.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enet-ios
          path: Source/Native/libenet.a

  # ── C# managed assembly ───────────────────────────────────────────────────
  build-csharp:
    name: Managed C# Assembly
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build C# project
        run: dotnet build Source/Managed/ENet-CSharp.csproj -c Release

      - name: Rename to ENet-CSharp.dll
        run: |
          find Source/Managed/bin/Release -name "*.dll" | xargs -I{} cp {} Source/Managed/bin/Release/ENet-CSharp.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enet-csharp-assembly
          path: Source/Managed/bin/Release/ENet-CSharp.dll

  # ── Bundle everything (only when building all) ────────────────────────────
  package:
    name: Bundle All Artifacts
    needs: [build-linux, build-windows, build-macos, build-android, build-ios, build-csharp]
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Verify output files
        run: |
          echo "=== All compiled files ==="
          find artifacts/ -type f | sort

      - name: Upload combined bundle
        uses: actions/upload-artifact@v4
        with:
          name: enet-all-platforms
          path: artifacts/