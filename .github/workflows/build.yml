name: Build ENet-CSharp

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - linux
          - windows
          - macos
          - android
          - ios
          - visionos

jobs:

  # ── Native library: Linux ──────────────────────────────────────────────────
  build-linux:
    name: Native – Linux (x64)
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'linux' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Configure & build
        run: |
          cmake -S Source/Native -B build-linux \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DENET_SHARED=true
          cmake --build build-linux --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enet-linux-x64
          path: build-linux/*.so

  # ── Native library: Windows ───────────────────────────────────────────────
  build-windows:
    name: Native – Windows (x64)
    runs-on: windows-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'windows' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure & build
        run: |
          cmake -S Source/Native -B build-windows -A x64 `
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 `
            -DENET_SHARED=true
          cmake --build build-windows --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enet-windows-x64
          path: build-windows/Release/*.dll

  # ── Native library: macOS ─────────────────────────────────────────────────
  build-macos:
    name: Native – macOS (x64)
    runs-on: macos-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'macos' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Configure & build
        run: |
          cmake -S Source/Native -B build-macos \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DENET_SHARED=true
          cmake --build build-macos --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enet-macos-x64
          path: build-macos/*.dylib

  # ── Android (arm64-v8a, armeabi-v7a, x86) ────────────────────────────────
  # NDK r28c (28.2.13676358) — 16KB page size support is ON by default
  build-android:
    name: Native – Android
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'android' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r28c (16KB page size support)
        run: sdkmanager "ndk;28.2.13676358"

      - name: Build with ndk-build
        run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/28.2.13676358
          cd Source/Native
          $ANDROID_NDK_HOME/ndk-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enet-android
          path: Source/Native/libs/

  # ── iOS (ARM64) ───────────────────────────────────────────────────────────
  build-ios:
    name: Native – iOS
    runs-on: macos-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'ios' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build with Xcode
        run: |
          cd Source/Native
          sh build-ios.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enet-ios
          path: Source/Native/libenet.a

  # ── visionOS / Apple Vision Pro (ARM64) ───────────────────────────────────
  build-visionos:
    name: Native – visionOS (Vision Pro)
    runs-on: macos-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'visionos' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Configure & build for visionOS
        run: |
          cmake -S Source/Native -B build-visionos \
            -G Xcode \
            -DCMAKE_SYSTEM_NAME=visionOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=1.0 \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build build-visionos --config Release \
            -- CODE_SIGNING_ALLOWED=NO

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enet-visionos
          path: build-visionos/**/*.a

  # ── C# managed assembly ───────────────────────────────────────────────────
  build-csharp:
    name: Managed C# Assembly
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build C# project
        run: dotnet build Source/Managed/ENet-CSharp.csproj -c Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enet-csharp-assembly
          path: Source/Managed/bin/Release/**/*.dll

  # ── Bundle everything (only when building all) ────────────────────────────
  package:
    name: Bundle All Artifacts
    needs: [build-linux, build-windows, build-macos, build-android, build-ios, build-visionos, build-csharp]
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Verify output files
        run: |
          echo "=== All compiled files ==="
          find artifacts/ -type f | sort

      - name: Upload combined bundle
        uses: actions/upload-artifact@v4
        with:
          name: enet-all-platforms
          path: artifacts/